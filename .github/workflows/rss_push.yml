name: RSS to Telegram Push

on:
  schedule:
    # 30분마다 실행 (UTC 기준)
    # 08:00 KST = 23:00 UTC (전날)
    # 19:00 KST = 10:00 UTC
    # 한국 시간 평일 08:00~19:00를 커버하기 위해 널넉하게 설정하거나 매 30분 실행 후 코드에서 제어
    - cron: '*/30 * * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS Pusher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rss_pusher.py

      - name: Commit and push if state changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json || true
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last seen status"
          # 토큰을 직접 사용하여 강제 푸시
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
